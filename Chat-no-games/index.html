<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>LocalChat</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:      #0d0f14;
    --surface: #141720;
    --surf2:   #1c2030;
    --border:  #252a3a;
    --text:    #e2e8f0;
    --muted:   #6b7a99;
    --accent:  #5b8af5;
    --danger:  #f87171;
    --success: #34d399;
    --sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    --mono: ui-monospace, 'SF Mono', 'Consolas', monospace;
  }

  html { height: 100%; }

  body {
    height: 100%; height: 100dvh;
    overflow: hidden;
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    font-size: 14px;
    display: flex; flex-direction: column;
    position: fixed; width: 100%;
    -webkit-font-smoothing: antialiased;
  }

  /* в”Җв”Җ SCREENS в”Җв”Җ */
  .screen {
    position: fixed; inset: 0;
    background: var(--bg);
    display: flex; align-items: center; justify-content: center;
    z-index: 100; padding: 20px;
  }
  .screen.hidden { display: none; }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 18px;
    padding: 36px;
    width: 100%; max-width: 360px;
    display: flex; flex-direction: column; gap: 20px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.5);
    animation: up .35s cubic-bezier(.16,1,.3,1);
  }

  @keyframes up {
    from { opacity:0; transform:translateY(16px); }
    to   { opacity:1; transform:translateY(0); }
  }

  .logo-title {
    font-size: 26px; font-weight: 800; letter-spacing: -.5px;
    background: linear-gradient(135deg, #5b8af5, #8b5cf6);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .logo-sub { color: var(--muted); font-size: 13px; margin-top: 3px; }

  .field { display: flex; flex-direction: column; gap: 7px; }
  .field label { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: .08em; color: var(--muted); }

  .field input, .field select {
    background: var(--surf2); border: 1.5px solid var(--border);
    border-radius: 10px; padding: 12px 14px;
    font-family: var(--sans); font-size: 16px;
    color: var(--text); outline: none; width: 100%;
    -webkit-appearance: none; appearance: none;
    transition: border-color .15s;
  }
  .field input:focus, .field select:focus { border-color: var(--accent); }
  .field input::placeholder { color: var(--muted); }
  .field input.err { border-color: var(--danger); animation: shake .3s ease; }

  @keyframes shake {
    0%,100% { transform:translateX(0); }
    25%      { transform:translateX(-7px); }
    75%      { transform:translateX(7px); }
  }

  .err-msg { font-size: 12px; color: var(--danger); display: none; }
  .err-msg.show { display: block; }

  .btn {
    background: linear-gradient(135deg, #5b8af5, #8b5cf6);
    border: none; border-radius: 10px; padding: 14px;
    font-family: var(--sans); font-size: 16px; font-weight: 700;
    color: #fff; cursor: pointer;
    -webkit-tap-highlight-color: transparent; touch-action: manipulation;
    transition: opacity .15s;
  }
  .btn:active { opacity: .82; }

  /* в”Җв”Җ APP в”Җв”Җ */
  #app {
    display: none; flex: 1; flex-direction: column;
    height: 100%; overflow: hidden; position: relative;
  }

  /* в”Җв”Җ HEADER в”Җв”Җ */
  header {
    display: flex; align-items: center;
    padding: 0 12px; height: 50px;
    border-bottom: 1px solid var(--border);
    background: var(--surface); flex-shrink: 0; gap: 8px;
  }

  .h-logo {
    font-size: 15px; font-weight: 800; letter-spacing: -.3px;
    background: linear-gradient(135deg, #5b8af5, #8b5cf6);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    background-clip: text; white-space: nowrap; flex-shrink: 0;
  }

  .tabs {
    display: flex; gap: 3px; flex: 1;
    overflow-x: auto; -webkit-overflow-scrolling: touch; scrollbar-width: none;
  }
  .tabs::-webkit-scrollbar { display: none; }

  .tab {
    padding: 5px 11px; border-radius: 7px;
    font-size: 13px; font-weight: 600; color: var(--muted);
    cursor: pointer; border: 1.5px solid transparent;
    white-space: nowrap; flex-shrink: 0;
    -webkit-tap-highlight-color: transparent; touch-action: manipulation;
    transition: all .15s; position: relative;
  }
  .tab.active { color: var(--accent); background: rgba(91,138,245,.1); border-color: rgba(91,138,245,.28); }

  .tab .badge {
    display: inline-block; background: var(--danger); color: #fff;
    font-size: 10px; font-weight: 700; border-radius: 10px;
    padding: 1px 5px; margin-left: 4px; min-width: 16px;
    text-align: center; vertical-align: middle;
    animation: pop .2s cubic-bezier(.16,1,.3,1);
  }
  @keyframes pop { from { transform:scale(0.5); opacity:0; } to { transform:scale(1); opacity:1; } }

  .h-right { display: flex; align-items: center; gap: 7px; flex-shrink: 0; }

  .dot { width: 7px; height: 7px; border-radius: 50%; background: var(--muted); flex-shrink: 0; transition: background .3s; }
  .dot.on { background: var(--success); box-shadow: 0 0 6px #34d399aa; }

  .count { font-size: 11px; color: var(--muted); white-space: nowrap; }

  /* в”Җв”Җ BODY в”Җв”Җ */
  .body { display: flex; flex: 1; overflow: hidden; min-height: 0; }

  /* в”Җв”Җ MESSAGES в”Җв”Җ */
  #msgs {
    flex: 1; overflow-y: auto; overflow-x: hidden;
    padding: 14px 0; display: flex; flex-direction: column; gap: 1px;
    -webkit-overflow-scrolling: touch;
  }
  #msgs::-webkit-scrollbar { width: 3px; }
  #msgs::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  .msg { display: flex; align-items: flex-start; gap: 10px; padding: 5px 14px; animation: min .18s ease; }
  @keyframes min { from { opacity:0; transform:translateY(3px); } to { opacity:1; transform:translateY(0); } }

  .avatar {
    width: 30px; height: 30px; border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-size: 12px; font-weight: 800; color: #000;
    flex-shrink: 0; margin-top: 1px;
  }

  .mc { flex: 1; min-width: 0; }
  .mh { display: flex; align-items: baseline; gap: 7px; margin-bottom: 3px; }
  .mname { font-size: 13px; font-weight: 700; }
  .mtime { font-size: 10px; color: var(--muted); flex-shrink: 0; }
  .mtext { color: #c9d4e8; line-height: 1.55; word-break: break-word; white-space: pre-wrap; font-size: 14px; }

  /* Image messages */
  .mimg {
    max-width: 260px; max-height: 300px;
    border-radius: 10px; display: block;
    cursor: pointer; border: 1px solid var(--border);
    transition: opacity .15s;
    object-fit: cover;
  }
  .mimg:active { opacity: .85; }

  .msg.own { flex-direction: row-reverse; }
  .msg.own .mh { flex-direction: row-reverse; }
  .msg.own .mtext {
    background: rgba(91,138,245,.13); border: 1px solid rgba(91,138,245,.22);
    border-radius: 10px 2px 10px 10px; padding: 8px 11px; display: inline-block;
  }
  .msg.own .mimg { border-radius: 10px 2px 10px 10px; }

  .sys { padding: 4px 14px; text-align: center; font-size: 11px; color: var(--muted); animation: min .18s ease; }
  .sys span { background: var(--surf2); padding: 2px 10px; border-radius: 20px; border: 1px solid var(--border); }

  .banner { text-align: center; padding: 18px 14px; color: var(--muted); font-size: 13px; }
  .banner strong { font-size: 19px; font-weight: 800; display: block; color: var(--accent); margin-bottom: 4px; }

  /* в”Җв”Җ SIDEBAR в”Җв”Җ */
  #sidebar {
    width: 155px; border-left: 1px solid var(--border);
    background: var(--surface); flex-shrink: 0;
    display: flex; flex-direction: column; overflow: hidden;
  }
  .sbh { padding: 12px 13px 8px; font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: .1em; color: var(--muted); border-bottom: 1px solid var(--border); flex-shrink: 0; }
  #ulist { flex: 1; overflow-y: auto; padding: 8px 0; -webkit-overflow-scrolling: touch; }
  .uitem { display: flex; align-items: center; gap: 8px; padding: 5px 13px; animation: min .18s ease; }
  .udot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .uname { font-size: 12px; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

  /* в”Җв”Җ INPUT в”Җв”Җ */
  .iarea {
    position: relative;
    padding: 10px 12px;
    padding-bottom: max(10px, env(safe-area-inset-bottom));
    border-top: 1px solid var(--border);
    background: var(--surface); flex-shrink: 0;
    display: flex; gap: 8px; align-items: flex-end;
  }

  .iwrap { flex: 1; }

  #minput {
    width: 100%; background: var(--surf2);
    border: 1.5px solid var(--border); border-radius: 10px;
    padding: 10px 13px; font-family: var(--sans); font-size: 16px;
    color: var(--text); outline: none; resize: none;
    max-height: 100px; line-height: 1.4;
    -webkit-appearance: none; transition: border-color .15s;
  }
  #minput:focus { border-color: rgba(91,138,245,.5); }
  #minput::placeholder { color: var(--muted); }

  /* Image upload button */
  #imgbtn {
    background: var(--surf2); border: 1.5px solid var(--border);
    border-radius: 10px; width: 42px; height: 42px;
    cursor: pointer; display: flex; align-items: center; justify-content: center;
    flex-shrink: 0; color: var(--muted);
    -webkit-tap-highlight-color: transparent; touch-action: manipulation;
    transition: border-color .15s, color .15s;
  }
  #imgbtn:hover { border-color: var(--accent); color: var(--accent); }
  #imgbtn:active { opacity: .75; }
  #imgbtn svg { width: 18px; height: 18px; }

  #sbtn {
    background: linear-gradient(135deg, #5b8af5, #8b5cf6);
    border: none; border-radius: 10px;
    width: 42px; height: 42px; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    -webkit-tap-highlight-color: transparent; touch-action: manipulation;
  }
  #sbtn:active { opacity: .8; }
  #sbtn svg { width: 16px; height: 16px; fill: #fff; }

  /* Upload progress bar */
  #upload-bar {
    display: none; height: 3px;
    background: var(--surf2); flex-shrink: 0;
  }
  #upload-progress {
    height: 100%; width: 0%;
    background: linear-gradient(90deg, #5b8af5, #8b5cf6);
    transition: width .2s;
  }

  #dbanner {
    display: none; background: rgba(248,113,113,.12);
    border-bottom: 1px solid rgba(248,113,113,.3);
    padding: 7px 14px; font-size: 12px;
    color: var(--danger); text-align: center; flex-shrink: 0;
  }

  /* в”Җв”Җ CONNECTING OVERLAY в”Җв”Җ */
  #overlay {
    position: absolute; inset: 0; background: var(--bg);
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 14px; z-index: 50; transition: opacity .3s;
  }
  #overlay.gone { opacity: 0; pointer-events: none; }
  .spinner { width: 36px; height: 36px; border: 3px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin .7s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .conn-text { font-size: 14px; color: var(--muted); }

  /* в”Җв”Җ IMAGE LIGHTBOX в”Җв”Җ */
  #lightbox {
    display: none; position: fixed; inset: 0;
    background: rgba(0,0,0,.92); z-index: 200;
    align-items: center; justify-content: center;
    padding: 20px;
  }
  #lightbox.show { display: flex; }
  #lightbox img { max-width: 100%; max-height: 90vh; border-radius: 10px; object-fit: contain; }
  #lightbox-close {
    position: absolute; top: 16px; right: 16px;
    background: rgba(255,255,255,.1); border: none; border-radius: 50%;
    width: 36px; height: 36px; color: #fff; font-size: 18px;
    cursor: pointer; display: flex; align-items: center; justify-content: center;
    -webkit-tap-highlight-color: transparent;
  }

  /* Image preview before send */
  #img-preview {
    display: none; padding: 8px 12px 0;
    flex-shrink: 0;
  }
  #img-preview.show { display: flex; align-items: center; gap: 10px; }
  #preview-thumb { width: 48px; height: 48px; border-radius: 8px; object-fit: cover; border: 1px solid var(--border); }
  #preview-name { font-size: 12px; color: var(--muted); flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  #preview-remove { background: none; border: none; color: var(--danger); cursor: pointer; font-size: 18px; padding: 4px; -webkit-tap-highlight-color: transparent; }

  @media (max-width: 580px) { #sidebar { display: none; } }

  /* в”Җв”Җ EMOJI PICKER в”Җв”Җ */
  #emoji-btn {
    background: var(--surf2); border: 1.5px solid var(--border);
    border-radius: 10px; width: 42px; height: 42px;
    cursor: pointer; display: flex; align-items: center; justify-content: center;
    flex-shrink: 0; font-size: 20px; line-height: 1;
    -webkit-tap-highlight-color: transparent; touch-action: manipulation;
    transition: border-color .15s;
  }
  #emoji-btn:hover { border-color: var(--accent); }
  #emoji-btn:active { opacity: .75; }

  #emoji-picker {
    display: none; position: absolute;
    bottom: 100%; right: 12px;
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 14px; padding: 10px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.5);
    z-index: 50; width: 300px;
    max-height: 260px; overflow-y: auto;
    -webkit-overflow-scrolling: touch;
    animation: up .2s cubic-bezier(.16,1,.3,1);
  }
  #emoji-picker.show { display: block; }

  .emoji-section-title {
    font-size: 10px; font-weight: 600; text-transform: uppercase;
    letter-spacing: .08em; color: var(--muted);
    padding: 6px 4px 4px;
  }

  .emoji-grid {
    display: grid; grid-template-columns: repeat(8, 1fr);
    gap: 2px; margin-bottom: 6px;
  }

  .emoji-grid button {
    background: none; border: none; border-radius: 6px;
    font-size: 22px; cursor: pointer; padding: 4px;
    text-align: center; line-height: 1;
    -webkit-tap-highlight-color: transparent;
    transition: background .1s;
  }
  .emoji-grid button:hover { background: var(--surf2); }
  .emoji-grid button:active { background: var(--border); }

  /* Paste indicator flash */
  @keyframes paste-flash {
    0%   { border-color: var(--success); }
    100% { border-color: rgba(91,138,245,.5); }
  }
  .paste-flash { animation: paste-flash .4s ease !important; }

  @media (max-width: 580px) {
    #emoji-picker { width: 260px; right: 0; }
    .emoji-grid { grid-template-columns: repeat(7, 1fr); }
  }
</style>
</head>
<body>

<!-- PASSCODE -->
<div id="s-code" class="screen">
  <div class="card">
    <div>
      <div class="logo-title">LocalChat</div>
      <div class="logo-sub">Enter the access code to continue</div>
    </div>
    <div class="field">
      <label>Access Code</label>
      <input id="code-in" type="tel" inputmode="numeric" placeholder="Enter 5-digit code" maxlength="5" autocomplete="off">
      <span class="err-msg" id="code-err">Incorrect code вҖ” try again</span>
    </div>
    <button class="btn" onclick="checkCode()">Continue вҶ’</button>
  </div>
</div>

<!-- NAME + CHANNEL -->
<div id="s-join" class="screen hidden">
  <div class="card">
    <div>
      <div class="logo-title">Join Chat</div>
      <div class="logo-sub">Pick your name and a channel</div>
    </div>
    <div class="field">
      <label>Your name</label>
      <input id="name-in" type="text" placeholder="e.g. Alice" maxlength="24" autocomplete="off" autocorrect="off" autocapitalize="words" spellcheck="false">
    </div>
    <div class="field">
      <label>Channel</label>
      <select id="chan-sel">
        <option value="General">рҹ’¬ General</option>
        <option value="Kids">рҹ§’ Kids</option>
        <option value="Adults">рҹҚё Adults</option>
      </select>
    </div>
    <button class="btn" onclick="doJoin()">Join вҶ’</button>
  </div>
</div>

<!-- APP -->
<div id="app">
  <div id="dbanner">вҡ  ReconnectingвҖҰ</div>
  <div id="upload-bar"><div id="upload-progress"></div></div>

  <header>
    <span class="h-logo">LocalChat</span>
    <div class="tabs">
      <div class="tab active" data-ch="General"  onclick="switchCh('General')">рҹ’¬ General</div>
      <div class="tab"        data-ch="Kids"     onclick="switchCh('Kids')">рҹ§’ Kids</div>
      <div class="tab"        data-ch="Adults"   onclick="switchCh('Adults')">рҹҚё Adults</div>
    </div>
    <div class="h-right">
      <div class="dot" id="sdot"></div>
      <span class="count" id="cnt"></span>
    </div>
  </header>

  <div class="body">
    <div id="msgs">
      <div id="overlay">
        <div class="spinner"></div>
        <div class="conn-text">ConnectingвҖҰ</div>
      </div>
    </div>
    <div id="sidebar">
      <div class="sbh" id="sbh">In General</div>
      <div id="ulist"></div>
    </div>
  </div>

  <!-- Image preview strip -->
  <div id="img-preview">
    <img id="preview-thumb" src="" alt="preview">
    <span id="preview-name"></span>
    <button id="preview-remove" onclick="clearImagePreview()">вң•</button>
  </div>

  <div class="iarea">
    <div class="iwrap">
      <textarea id="minput" rows="1" placeholder="MessageвҖҰ" maxlength="2000"
        autocorrect="on" autocapitalize="sentences" spellcheck="true"></textarea>
    </div>
    <!-- Hidden file input -->
    <input type="file" id="file-in" accept="image/jpeg,image/png,image/gif,image/webp" style="display:none">
    <!-- Emoji picker popup -->
    <div id="emoji-picker"></div>
    <!-- Emoji button -->
    <button id="emoji-btn" onclick="toggleEmoji()" title="Emoji">рҹҳҠ</button>
    <!-- Image button -->
    <button id="imgbtn" onclick="$('file-in').click()" title="Send image">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/>
        <polyline points="21 15 16 10 5 21"/>
      </svg>
    </button>
    <button id="sbtn" onclick="sendMsg()">
      <svg viewBox="0 0 24 24"><path d="M2 21l21-9L2 3v7l15 2-15 2z"/></svg>
    </button>
  </div>
</div>

<!-- Lightbox for full-size images -->
<div id="lightbox" onclick="closeLightbox()">
  <button id="lightbox-close" onclick="closeLightbox()">вң•</button>
  <img id="lightbox-img" src="" alt="">
</div>

<script>
const CHANNELS = ['General','Kids','Adults'];
const EMOJI = { General:'рҹ’¬', Kids:'рҹ§’', Adults:'рҹҚё' };

let ws, myName, myColor, myCh = 'General';
let code = '', kaTimer = null, reconnTimer = null;
let pendingFile = null; // image waiting to be sent

const $ = id => document.getElementById(id);
const msgsEl  = $('msgs');
const minput  = $('minput');
const sdot    = $('sdot');
const cnt     = $('cnt');
const ulist   = $('ulist');
const dbanner = $('dbanner');
const sbh     = $('sbh');
const fileIn  = $('file-in');
const overlay = $('overlay');

// в”Җв”Җ PASSCODE в”Җв”Җ
$('code-in').addEventListener('keydown', e => { if(e.key==='Enter') checkCode(); });

function checkCode() {
  code = $('code-in').value.trim();
  if (code === '67563') {
    $('s-code').classList.add('hidden');
    $('s-join').classList.remove('hidden');
    setTimeout(() => $('name-in').focus(), 80);
  } else {
    const el = $('code-in');
    el.classList.add('err'); $('code-err').classList.add('show');
    setTimeout(() => {
      el.value = ''; code = '';
      el.classList.remove('err'); $('code-err').classList.remove('show');
      el.focus();
    }, 1200);
  }
}

// в”Җв”Җ JOIN в”Җв”Җ
$('name-in').addEventListener('keydown', e => { if(e.key==='Enter') doJoin(); });

function doJoin() {
  const name = $('name-in').value.trim();
  if (!name) return;
  myName = name;
  myCh = $('chan-sel').value;
  $('s-join').classList.add('hidden');
  $('app').style.display = 'flex';
  connect();
}

// в”Җв”Җ WEBSOCKET в”Җв”Җ
function connect() {
  clearTimeout(reconnTimer);
  clearInterval(kaTimer);

  const proto = location.protocol === 'https:' ? 'wss' : 'ws';
  ws = new WebSocket(`${proto}://${location.host}`);

  let overlayFallback = setTimeout(hideOverlay, 4000);

  ws.onopen = () => {
    setOnline(true);
    dbanner.style.display = 'none';
    ws.send(JSON.stringify({ type:'join', name:myName, code, channel:myCh }));
    kaTimer = setInterval(() => {
      if (ws && ws.readyState === WebSocket.OPEN) {
        try { ws.send(JSON.stringify({type:'ping'})); } catch(e){}
      }
    }, 20000);
  };

  ws.onmessage = e => {
    hideOverlay();
    clearTimeout(overlayFallback);
    let m; try { m = JSON.parse(e.data); } catch { return; }
    if      (m.type==='history') renderHistory(m.messages);
    else if (m.type==='message' && m.channel===myCh) renderMsg(m);
    else if (m.type==='image'   && m.channel===myCh) renderImg(m);
    else if (m.type==='system'  && m.channel===myCh) renderSys(m.text);
    else if (m.type==='users'   && m.channel===myCh) renderUsers(m.users);
    else if (m.type==='error')   alert(m.text);
  };

  ws.onclose = () => {
    setOnline(false);
    dbanner.style.display = 'block';
    clearInterval(kaTimer);
    clearTimeout(overlayFallback);
    hideOverlay();
    reconnTimer = setTimeout(connect, 3000);
  };

  ws.onerror = () => { try { ws.close(); } catch(e){} };
}

  if (!document.hidden && ws && ws.readyState !== WebSocket.OPEN) connect();

window.addEventListener('focus', () => {

});

function setOnline(on) { sdot.className = 'dot' + (on ? ' on' : ''); }

function hideOverlay() {
  overlay.classList.add('gone');
  setTimeout(() => { overlay.style.display = 'none'; }, 300);
}

function showOverlay(text) {
  overlay.style.display = 'flex';
  overlay.classList.remove('gone');
  overlay.querySelector('.conn-text').textContent = text || 'ConnectingвҖҰ';
}

// в”Җв”Җ CHANNELS в”Җв”Җ
function switchCh(ch) {
  if (ch === myCh) return;
  myCh = ch;
  document.querySelectorAll('.tab').forEach(t => {
    t.className = 'tab' + (t.dataset.ch === ch ? ' active' : '');
  });
  sbh.textContent = `In ${ch}`;
  msgsEl.innerHTML = '';
  msgsEl.appendChild(overlay);
  showOverlay('LoadingвҖҰ');
  cnt.textContent = ''; ulist.innerHTML = '';
  clearImagePreview();
  if (ws && ws.readyState === WebSocket.OPEN) {
    ws.send(JSON.stringify({ type:'switch_channel', channel:ch }));
  }
  minput.placeholder = `Message ${ch}вҖҰ`;
}

// в”Җв”Җ IMAGE PICKER в”Җв”Җ
fileIn.addEventListener('change', () => {
  const file = fileIn.files[0];
  if (!file) return;
  if (file.size > 5 * 1024 * 1024) { alert('Image must be under 5MB'); fileIn.value = ''; return; }

  pendingFile = file;
  const reader = new FileReader();
  reader.onload = e => {
    $('preview-thumb').src = e.target.result;
    $('preview-name').textContent = file.name;
    $('img-preview').classList.add('show');
  };
  reader.readAsDataURL(file);
  fileIn.value = '';
});

function clearImagePreview() {
  pendingFile = null;
  $('img-preview').classList.remove('show');
  $('preview-thumb').src = '';
}

// в”Җв”Җ PASTE IMAGE в”Җв”Җ
minput.addEventListener('paste', e => {
  const items = (e.clipboardData || e.originalEvent.clipboardData).items;
  for (const item of items) {
    if (item.type.startsWith('image/')) {
      e.preventDefault();
      const file = item.getAsFile();
      if (!file) continue;
      if (file.size > 5 * 1024 * 1024) { alert('Image must be under 5MB'); return; }
      pendingFile = file;
      const reader = new FileReader();
      reader.onload = ev => {
        $('preview-thumb').src = ev.target.result;
        $('preview-name').textContent = 'Pasted image';
        $('img-preview').classList.add('show');
        // Flash the input border green to confirm paste
        minput.classList.add('paste-flash');
        setTimeout(() => minput.classList.remove('paste-flash'), 400);
      };
      reader.readAsDataURL(file);
      return;
    }
  }
});

function buildEmojiPicker() {
  const picker = $('emoji-picker');
  picker.innerHTML = '';
  for (const [section, emojis] of Object.entries(EMOJIS)) {
    const title = document.createElement('div');
    title.className = 'emoji-section-title';
    title.textContent = section;
    picker.appendChild(title);
    const grid = document.createElement('div');
    grid.className = 'emoji-grid';
    emojis.forEach(emoji => {
      const btn = document.createElement('button');
      btn.textContent = emoji;
      btn.onclick = () => insertEmoji(emoji);
      grid.appendChild(btn);
    });
    picker.appendChild(grid);
  }
}

function toggleEmoji() {
  const picker = $('emoji-picker');
  if (!picker.children.length) buildEmojiPicker();
  picker.classList.toggle('show');
}

function insertEmoji(emoji) {
  const start = minput.selectionStart;
  const end = minput.selectionEnd;
  const val = minput.value;
  minput.value = val.slice(0, start) + emoji + val.slice(end);
  minput.selectionStart = minput.selectionEnd = start + emoji.length;
  minput.focus();
  minput.dispatchEvent(new Event('input'));
}

// Close emoji picker when clicking outside
document.addEventListener('click', e => {
  if (!$('emoji-btn').contains(e.target) && !$('emoji-picker').contains(e.target)) {
    $('emoji-picker').classList.remove('show');
  }
});

// в”Җв”Җ SEND в”Җв”Җ
minput.addEventListener('input', () => {
  minput.style.height = 'auto';
  minput.style.height = Math.min(minput.scrollHeight, 100) + 'px';
});
minput.addEventListener('keydown', e => {
  if (e.key==='Enter' && !e.shiftKey) { e.preventDefault(); sendMsg(); }
});

async function sendMsg() {
  if (!ws || ws.readyState !== WebSocket.OPEN) { connect(); return; }

  // Send pending image first if any
  if (pendingFile) {
    await uploadAndSendImage(pendingFile);
    clearImagePreview();
  }

  // Send text
  const text = minput.value.trim();
  if (text) {
    ws.send(JSON.stringify({ type:'message', text }));
    minput.value = '';
    minput.style.height = 'auto';
  }
}

async function uploadAndSendImage(file) {
  const bar = $('upload-bar');
  const prog = $('upload-progress');
  bar.style.display = 'block';
  prog.style.width = '10%';

  try {
    const resp = await fetch('/upload', {
      method: 'POST',
      headers: {
        'Content-Type': file.type,
        'X-Access-Code': code
      },
      body: file
    });

    prog.style.width = '90%';

    if (!resp.ok) {
      const err = await resp.json().catch(() => ({}));
      alert(err.error || 'Upload failed');
      return;
    }

    const { url } = await resp.json();
    prog.style.width = '100%';

    // Tell everyone via WebSocket
    ws.send(JSON.stringify({ type:'image', url }));

  } catch(e) {
    alert('Upload failed вҖ” check your connection');
  } finally {
    setTimeout(() => {
      bar.style.display = 'none';
      prog.style.width = '0%';
    }, 400);
  }
}

// в”Җв”Җ RENDER в”Җв”Җ
function renderHistory(msgs) {
  // Keep overlay in msgs, clear everything else
  const ov = overlay;
  msgsEl.innerHTML = '';
  msgsEl.appendChild(ov);

  addBanner(`${EMOJI[myCh]} ${myCh}`, msgs.length ? `Last ${msgs.length} messages` : 'No messages yet вҖ” say hello!');
  const frag = document.createDocumentFragment();
  msgs.forEach(m => {
    if      (m.type==='message') frag.appendChild(buildMsg(m));
    else if (m.type==='image')   frag.appendChild(buildImgMsg(m));
    else if (m.type==='system')  frag.appendChild(buildSys(m.text));
  });
  msgsEl.appendChild(frag);
  scrollEnd();
}

function renderMsg(m) { msgsEl.appendChild(buildMsg(m)); scrollEnd(); }
function renderImg(m) { msgsEl.appendChild(buildImgMsg(m)); scrollEnd(); }
function renderSys(t) { msgsEl.appendChild(buildSys(t)); scrollEnd(); }

function buildMsg(m) {
  const isOwn = m.name === myName;
  if (isOwn && !myColor) myColor = m.color;
  const d = document.createElement('div');
  d.className = 'msg' + (isOwn ? ' own' : '');
  d.innerHTML =
    `<div class="avatar" style="background:${m.color}">${m.name[0].toUpperCase()}</div>` +
    `<div class="mc">` +
      `<div class="mh"><span class="mname" style="color:${m.color}">${esc(m.name)}</span><span class="mtime">${fmtTime(m.ts)}</span></div>` +
      `<div class="mtext">${esc(m.text)}</div>` +
    `</div>`;
  return d;
}

function buildImgMsg(m) {
  const isOwn = m.name === myName;
  const d = document.createElement('div');
  d.className = 'msg' + (isOwn ? ' own' : '');
  const img = document.createElement('img');
  img.className = 'mimg';
  img.src = m.url;
  img.alt = 'image';
  img.loading = 'lazy';
  img.onclick = () => openLightbox(m.url);
  const mc = document.createElement('div');
  mc.className = 'mc';
  mc.innerHTML = `<div class="mh"><span class="mname" style="color:${m.color}">${esc(m.name)}</span><span class="mtime">${fmtTime(m.ts)}</span></div>`;
  mc.appendChild(img);
  d.innerHTML = `<div class="avatar" style="background:${m.color}">${m.name[0].toUpperCase()}</div>`;
  d.appendChild(mc);
  return d;
}

function buildSys(text) {
  const d = document.createElement('div');
  d.className = 'sys';
  d.innerHTML = `<span>${esc(text)}</span>`;
  return d;
}

function addBanner(title, sub) {
  const d = document.createElement('div');
  d.className = 'banner';
  d.innerHTML = `<strong>${title}</strong>${esc(sub)}`;
  msgsEl.appendChild(d);
}

function renderUsers(users) {
  cnt.textContent = `${users.length} here`;
  ulist.innerHTML = '';
  const frag = document.createDocumentFragment();
  users.forEach(u => {
    const d = document.createElement('div');
    d.className = 'uitem';
    d.innerHTML = `<div class="udot" style="background:${u.color}"></div><span class="uname">${esc(u.name)}</span>`;
    frag.appendChild(d);
  });
  ulist.appendChild(frag);
}

// в”Җв”Җ LIGHTBOX в”Җв”Җ
function openLightbox(url) {
  $('lightbox-img').src = url;
  $('lightbox').classList.add('show');
}
function closeLightbox() {
  $('lightbox').classList.remove('show');
  $('lightbox-img').src = '';
}

function scrollEnd() { requestAnimationFrame(() => { msgsEl.scrollTop = msgsEl.scrollHeight; }); }
function fmtTime(ts) { return new Date(ts).toLocaleTimeString([], { hour:'2-digit', minute:'2-digit' }); }
function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
</script>
</body>
</html>
